<svg width="900" height="140" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="140" fill="#0d1117"/>
  <!-- Quote box -->
  <rect x="40" y="15" width="820" height="112" rx="6" fill="#0d1117" stroke="#00ff41" stroke-width="1" opacity="1"/>
  <rect x="40" y="15" width="820" height="112" rx="6" fill="#00ff4108"/>
  <!-- Left quote mark -->
  <text x="60" y="52" font-family="monospace" font-size="28" fill="#00ff41" opacity="0.7">"</text>
  <!-- Quote lines -->
  <text x="90" y="52" font-family="monospace" font-size="14" fill="#cccccc" font-style="italic">The quieter you become, the more you can hear.</text>
  <text x="90" y="75" font-family="monospace" font-size="14" fill="#cccccc" font-style="italic">The more you learn.</text>
  <text x="855" y="75" font-family="monospace" font-size="28" fill="#00ff41" opacity="0.7">"</text>
  <!-- Attribution -->
  <text x="90" y="108" font-family="monospace" font-size="12" fill="#00ff41">— Stay curious. Stay secure.</text>
</svg>
